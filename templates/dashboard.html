{% extends "layout.html" %}
{% block content %}
<div class="glass-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0;">Instructor Dashboard</h2>
        <button class="btn btn-primary" onclick="openCreateModal()" style="width: auto; padding: 10px 20px;">+ New Quiz</button>
    </div>

    <div id="quizList">
        <h4 style="color: #64748b; font-size: 0.8rem; text-transform: uppercase; margin-top: 30px;">Your Active Quizzes</h4>
        {% for quiz in quizzes %}
        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.05);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div style="font-weight: 600;">{{ quiz.title }}</div>
                    <code style="color: var(--primary); font-size: 1.1rem;">{{ quiz.code }}</code>
                </div>
                <button class="btn" onclick="openQuestionModal('{{ quiz.id }}', '{{ quiz.title }}')" style="width: auto; padding: 8px 15px; background: #22c55e; color: white; font-size: 0.8rem;">Add Questions</button>
            </div>
        </div>
        {% else %}
        <p style="color: #64748b; text-align: center;">No quizzes yet.</p>
        {% endfor %}
    </div>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0;">
    <a href="/logout" class="nav-link" style="display: block; text-align: center;">Logout</a>
</div>

<div id="createModal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 90%; max-width: 400px;">
        <h3>New Quiz</h3>
        <input type="text" id="quizTitle" placeholder="Quiz Title">
        <input type="text" id="quizSubject" placeholder="Subject">
        <button class="btn btn-primary" onclick="submitQuiz()">Generate Code</button>
        <button class="btn" onclick="closeModal('createModal')" style="background:transparent; color:#94a3b8;">Cancel</button>
    </div>
</div>

<div id="questionModal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; overflow-y: auto;">
    <div class="glass-card" style="width: 95%; max-width: 500px; margin: 20px;">
        <h3 id="modalQuizTitle">Add Question</h3>
        <input type="hidden" id="activeQuizId">
        <textarea id="qText" placeholder="Question Text" style="width:100%; height:80px; background:rgba(0,0,0,0.3); color:white; border-radius:10px; padding:10px; margin-bottom:10px; border:1px solid #334155;"></textarea>
        <input type="text" id="optA" placeholder="Option A">
        <input type="text" id="optB" placeholder="Option B">
        <input type="text" id="optC" placeholder="Option C">
        <input type="text" id="optD" placeholder="Option D">
        <label style="font-size: 0.8rem; color: #94a3b8;">Correct Answer:</label>
        <select id="correctOpt" style="width:100%; padding:12px; background:#1e293b; color:white; border-radius:10px; margin-bottom:20px; border:1px solid #334155;">
            <option value="A">Option A</option>
            <option value="B">Option B</option>
            <option value="C">Option C</option>
            <option value="D">Option D</option>
        </select>
        <button class="btn btn-primary" onclick="submitQuestion()">Save & Add Another</button>
        <button class="btn" onclick="location.reload()" style="background:transparent; color:#94a3b8;">Done</button>
    </div>
</div>

<script>
function openCreateModal() { document.getElementById('createModal').style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

async function submitQuiz() {
    const res = await fetch('/api/quiz/create', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ title: document.getElementById('quizTitle').value, subject: document.getElementById('quizSubject').value })
    });
    if(res.ok) location.reload();
}

function openQuestionModal(id, title) {
    document.getElementById('activeQuizId').value = id;
    document.getElementById('modalQuizTitle').innerText = "Adding to: " + title;
    document.getElementById('questionModal').style.display = 'flex';
}

async function submitQuestion() {
    const res = await fetch('/api/quiz/add_question', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            quiz_id: document.getElementById('activeQuizId').value,
            text: document.getElementById('qText').value,
            a: document.getElementById('optA').value,
            b: document.getElementById('optB').value,
            c: document.getElementById('optC').value,
            d: document.getElementById('optD').value,
            correct: document.getElementById('correctOpt').value
        })
    });
    if(res.ok) {
        alert("Question Saved!");
        ['qText', 'optA', 'optB', 'optC', 'optD'].forEach(id => document.getElementById(id).value = "");
    }
}
</script>
{% endblock %}
