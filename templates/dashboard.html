{% extends "layout.html" %}
{% block content %}
<div class="glass-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0;">Instructor Control</h2>
        <button class="btn btn-primary" onclick="toggleModal('createModal', 'flex')" style="width: auto; padding: 10px 20px;">+ AI Quiz Creator</button>
    </div>

    <div id="quizList">
        <h4 style="color: #64748b; font-size: 0.8rem; text-transform: uppercase; margin-top: 30px;">Active Quiz Sessions</h4>
        {% for quiz in quizzes %}
        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div style="font-weight: 600;">{{ quiz.title }}</div>
                <code style="color: var(--primary); font-size: 1.1rem; letter-spacing: 2px;">{{ quiz.code }}</code>
            </div>
            <button class="btn" onclick="openQuestionModal('{{ quiz.id }}', '{{ quiz.title }}')" style="width: auto; padding: 8px 15px; background: #22c55e; color: white; font-size: 0.8rem;">Manual Add</button>
        </div>
        {% else %}
        <p style="color: #64748b; text-align: center; margin-top: 20px;">No quizzes found. Use the AI creator to start.</p>
        {% endfor %}
    </div>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0;">
    <a href="/logout" class="nav-link" style="display: block; text-align: center;">Secure Logout</a>
</div>

<div id="createModal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 999; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 90%; max-width: 400px; border: 1px solid var(--primary);">
        <h3>AI Generator</h3>
        <input type="text" id="aiTitle" placeholder="Quiz Title (e.g. Cyber Basics)" required>
        <input type="text" id="aiSubject" placeholder="Subject (e.g. Networking)" required>
        
        <label style="font-size: 0.7rem; color: #94a3b8; display: block; margin-top: 10px;">Upload Study Material (.txt or .pdf)</label>
        <input type="file" id="aiFile" accept=".txt,.pdf" style="margin-top: 5px;">
        
        <button class="btn btn-primary" onclick="submitAIQuiz()" id="aiSubmitBtn">Generate with Gemini AI</button>
        <button class="btn" onclick="toggleModal('createModal', 'none')" style="background:transparent; color:#94a3b8; margin-top: 10px;">Cancel</button>
    </div>
</div>

<div id="manualModal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 95%; max-width: 500px;">
        <h3 id="manualTitle">Add Question</h3>
        <input type="hidden" id="manualQuizId">
        <textarea id="qText" placeholder="Question Text" style="width:100%; background:rgba(0,0,0,0.2); color:white; padding:10px; border-radius:10px; margin-bottom:10px;"></textarea>
        <input type="text" id="optA" placeholder="Option A">
        <input type="text" id="optB" placeholder="Option B">
        <input type="text" id="optC" placeholder="Option C">
        <input type="text" id="optD" placeholder="Option D">
        <select id="qCorrect" style="width:100%; padding:10px; background:#1e293b; color:white; margin-bottom:15px;">
            <option value="A">Correct: A</option><option value="B">Correct: B</option>
            <option value="C">Correct: C</option><option value="D">Correct: D</option>
        </select>
        <button class="btn btn-primary" onclick="submitManualQuestion()">Save Question</button>
        <button class="btn" onclick="location.reload()" style="background:transparent; color:#94a3b8;">Done</button>
    </div>
</div>

<script>
function toggleModal(id, state) {
    document.getElementById(id).style.display = state;
}

function openQuestionModal(id, title) {
    document.getElementById('manualQuizId').value = id;
    document.getElementById('manualTitle').innerText = "Adding to: " + title;
    toggleModal('manualModal', 'flex');
}

async function submitAIQuiz() {
    const btn = document.getElementById('aiSubmitBtn');
    const formData = new FormData();
    formData.append('title', document.getElementById('aiTitle').value);
    formData.append('subject', document.getElementById('aiSubject').value);
    formData.append('file', document.getElementById('aiFile').files[0]);

    if(!document.getElementById('aiTitle').value) return alert("Title required");

    btn.innerText = "AI is generating questions...";
    btn.disabled = true;

    try {
        const res = await fetch('/api/quiz/create_with_ai', { method: 'POST', body: formData });
        if(res.ok) { location.reload(); } 
        else { alert("AI Error. Check your API Key in Render Environment."); btn.disabled = false; btn.innerText = "Generate with Gemini AI"; }
    } catch (e) { alert("Network error"); btn.disabled = false; }
}

async function submitManualQuestion() {
    const payload = {
        quiz_id: document.getElementById('manualQuizId').value,
        text: document.getElementById('qText').value,
        a: document.getElementById('optA').value, b: document.getElementById('optB').value,
        c: document.getElementById('optC').value, d: document.getElementById('optD').value,
        correct: document.getElementById('qCorrect').value
    };
    const res = await fetch('/api/quiz/add_question', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    if(res.ok) { alert("Saved!"); ['qText','optA','optB','optC','optD'].forEach(i => document.getElementById(i).value=""); }
}
</script>
{% endblock %}
