<div id="createModal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 90%; max-width: 400px; border: 1px solid var(--primary);">
        <h3>Initialize New Quiz</h3>
        
        <form id="quizForm">
            <div style="margin-bottom: 15px;">
                <label style="font-size: 0.7rem; color: #94a3b8;">QUIZ TITLE</label>
                <input type="text" id="aiTitle" placeholder="e.g. Mid-term Exam" required>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="font-size: 0.7rem; color: #94a3b8;">SUBJECT</label>
                <input type="text" id="aiSubject" placeholder="e.g. Computer Science" required>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="font-size: 0.7rem; color: #94a3b8;">STUDY MATERIAL (OPTIONAL)</label>
                <input type="file" id="aiFile" accept=".txt,.pdf">
            </div>

            <button type="button" class="btn btn-primary" onclick="submitAIQuiz()" id="initBtn">Create Quiz Session</button>
            <button type="button" class="btn" onclick="toggleModal('createModal', 'none')" style="background:transparent; color:#94a3b8; margin-top: 10px;">Cancel</button>
        </form>
    </div>
</div>

<script>
async function submitAIQuiz() {
    const btn = document.getElementById('initBtn');
    const title = document.getElementById('aiTitle').value;
    const subject = document.getElementById('aiSubject').value;
    const fileField = document.getElementById('aiFile');

    // 1. Validation
    if(!title || !subject) {
        alert("Please provide both a Title and a Subject.");
        return;
    }

    // 2. Prepare Data (Multipart for file support)
    const formData = new FormData();
    formData.append('title', title);
    formData.append('subject', subject);
    if(fileField.files[0]) {
        formData.append('file', fileField.files[0]);
    }

    // 3. UI Feedback
    btn.innerText = "Initializing...";
    btn.disabled = true;

    // 4. Send to Python API
    try {
        const res = await fetch('/api/quiz/create_with_ai', {
            method: 'POST',
            body: formData 
        });

        if(res.ok) {
            location.reload(); // Success!
        } else {
            const errData = await res.json();
            alert("Error: " + (errData.message || "Failed to initialize."));
            btn.innerText = "Create Quiz Session";
            btn.disabled = false;
        }
    } catch (error) {
        alert("Network Error: Could not connect to the server.");
        btn.innerText = "Create Quiz Session";
        btn.disabled = false;
    }
}
</script>
