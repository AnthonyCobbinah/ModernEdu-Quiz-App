<div id="createModal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(40, 6, 163, 0.8); z-index: 1000; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 90%; max-width: 400px;">
        <h3>AI Quiz Generator</h3>
        <form id="aiForm">
            <input type="text" id="quizTitle" placeholder="Quiz Title" required>
            <input type="text" id="quizSubject" placeholder="Subject (e.g. Science)" required>
            
            <label style="font-size: 0.7rem; color: #f8f9fc; display: block; margin-top: 10px;">Upload Study Material (Optional)</label>
            <input type="file" id="quizFile" accept=".txt,.pdf" style="margin-top: 5px;">
            
            <button type="button" class="btn btn-primary" onclick="submitAIQuiz()" id="aiBtn">Generate with AI</button>
            <button type="button" class="btn" onclick="closeModal('createModal')" style="background:transparent; color:#f5f7f9;">Cancel</button>
        </form>
    </div>
</div>

<script>
async function submitAIQuiz() {
    const btn = document.getElementById('aiBtn');
    const formData = new FormData();
    formData.append('title', document.getElementById('quizTitle').value);
    formData.append('subject', document.getElementById('quizSubject').value);
    formData.append('file', document.getElementById('quizFile').files[0]);

    btn.innerText = "AI is thinking...";
    btn.disabled = true;

    const res = await fetch('/api/quiz/create_with_ai', {
        method: 'POST',
        body: formData // Note: No headers needed for FormData
    });

    if(res.ok) {
        location.reload();
    } else {
        alert("AI Generation failed. Check API Key.");
        btn.innerText = "Generate with AI";
        btn.disabled = false;
    }
}
</script>
