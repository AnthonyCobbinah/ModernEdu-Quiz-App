{% extends "layout.html" %}
{% block content %}
<div class="glass-card">
    <h2 style="text-align: center;">Secure Sign In</h2>
    <div id="err" style="color: #ff4444; font-size: 0.8rem; text-align: center; margin-bottom: 10px;"></div>
    <form id="logForm">
        <input type="text" id="login_id" placeholder="Username or Index Number" required>
        <input type="password" id="password" placeholder="Passkey" required>
        <button type="submit" class="btn btn-primary">Authenticate</button>
    </form>
    <div style="text-align: center; margin-top: 20px;">
        <a href="/" class="nav-link">← Back to Selection</a>
    </div>
</div>

<script>
document.getElementById('logForm').onsubmit = async (e) => {
    e.preventDefault();
    const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            login_id: document.getElementById('login_id').value,
            password: document.getElementById('password').value
        })
    });
    const data = await res.json();
    if(res.ok) {
        // Redirection logic based on role
        window.location.href = data.role === 'teacher' ? '/dashboard' : '/student_home';
    } else {
        document.getElementById('err').innerText = data.message;
    }
};
</script>
{% endblock %}
