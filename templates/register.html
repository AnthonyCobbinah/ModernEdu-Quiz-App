{% extends "layout.html" %}
{% block content %}
<div class="glass-card">
    <h2>{{ role.capitalize() }} Enrollment</h2>
    <form id="regForm">
        <input type="text" id="full_name" placeholder="Full Name" required>
        {% if role == 'teacher' %}
            <input type="text" id="username" placeholder="Username" required>
        {% else %}
            <input type="text" id="index_number" placeholder="Index Number" required>
        {% endif %}
        <input type="password" id="password" placeholder="Passkey" required>
        <button type="submit" class="btn btn-primary">Initialize Account</button>
    </form>
</div>

<script>
document.getElementById('regForm').onsubmit = async (e) => {
    e.preventDefault();
    const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            full_name: document.getElementById('full_name').value,
            password: document.getElementById('password').value,
            role: "{{ role }}",
            username: document.getElementById('username')?.value,
            index_number: document.getElementById('index_number')?.value
        })
    });
    if(res.ok) location.href = '/login';
};
</script>
{% endblock %}
